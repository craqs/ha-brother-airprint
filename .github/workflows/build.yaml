name: Build add-on

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "renovate.json"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds the add-on (Dockerfile uses ARG BUILD_FROM) and pushes
      # ghcr.io/craqs/ha-brother-airprint-<arch>:<version> + :latest.
      - name: Build ${{ matrix.arch }} add-on
        uses: home-assistant/builder@62a1597b84b3461abad9816d9cd92862a2b542c3 # 2026.03.2
        with:
          args: |
            --${{ matrix.arch }} \
            --target . \
            --image "ha-brother-airprint-{arch}" \
            --docker-hub "ghcr.io/craqs" \
            --addon
