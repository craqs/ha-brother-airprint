daemon off;
worker_processes 1;
pid /var/run/nginx.pid;
error_log stderr;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;

    server {
        listen 8099;

        # Only allow connections from HA Ingress proxy
        allow 172.30.32.0/24;
        deny all;

        location / {
            proxy_pass http://127.0.0.1:631;
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Strip CUPS security headers that block iframe embedding
            # (HA Ingress renders the addon UI inside an iframe)
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            # Rewrite absolute paths in CUPS HTML to include the
            # Ingress base path (provided via X-Ingress-Path header).
            sub_filter_types text/html text/css application/javascript;
            sub_filter_once off;
            sub_filter 'href="/' 'href="$http_x_ingress_path/';
            sub_filter 'action="/' 'action="$http_x_ingress_path/';
            sub_filter 'src="/' 'src="$http_x_ingress_path/';
            sub_filter 'url(/' 'url($http_x_ingress_path/';
            sub_filter 'URL=/' 'URL=$http_x_ingress_path/';

            # Handle Location header redirects from CUPS
            proxy_redirect / $http_x_ingress_path/;
        }
    }
}
